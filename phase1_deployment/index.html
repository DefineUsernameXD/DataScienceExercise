<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Indie Game Price Predictor</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Include ML.js library -->
    <script src="https://www.unpkg.com/ml@7.3.0/dist/ml.min.js"></script>
</head>
<body>
    <div class="glass-container">
        <h1>Steam Game Price Predictor</h1>
        <p class="subtitle">Estimate the expected launch price based on 10 game features.</p>
        
        <form id="prediction-form">
            <div class="form-grid">
                
                <!-- COLUMN 1: Numerical Baselines -->
                <div class="column-left">
                    <div class="form-group">
                        <label for="average_playtime">Target Playtime (Minutes)</label>
                        <div class="slider-wrapper">
                            <input type="range" id="average_playtime" min="0" max="20000" step="10" value="300">
                            <span class="value-display" id="playtime_val">300</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="achievements">Planned Achievements</label>
                        <div class="slider-wrapper">
                            <input type="range" id="achievements" min="0" max="1000" step="1" value="25">
                            <span class="value-display" id="achievements_val">25</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="release_year">Target Release Year</label>
                        <div class="slider-wrapper">
                            <input type="range" id="release_year" min="2000" max="2026" step="1" value="2024">
                            <span class="value-display" id="year_val">2024</span>
                        </div>
                    </div>
                    
                    <label style="margin-top:20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Platform</label>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_windows" checked disabled><span class="slider round" style="cursor: not-allowed; opacity: 0.5;"></span></label><span class="toggle-label" style="opacity: 0.5;">Windows (Mandatory)</span></div>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_mac"><span class="slider round"></span></label><span class="toggle-label">Mac OS</span></div>
                </div>

                <!-- COLUMN 2: Categorical Features -->
                <div class="column-right">
                    
                    <label style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Publisher</label>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="self_published" checked><span class="slider round"></span></label><span class="toggle-label">Self-Published</span></div>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="english" checked><span class="slider round"></span></label><span class="toggle-label">English Available</span></div>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_early_access"><span class="slider round"></span></label><span class="toggle-label">Early Access</span></div>
                    
                    <label style="margin-top:20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Store Tags & Genres</label>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_multiplayer"><span class="slider round"></span></label><span class="toggle-label">Multiplayer</span></div>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_indie" checked><span class="slider round"></span></label><span class="toggle-label">Indie</span></div>
                    <div class="form-group toggle-group"><label class="toggle"><input type="checkbox" id="is_action"><span class="slider round"></span></label><span class="toggle-label">Action</span></div>
                </div>
                
            </div>

            <button type="button" class="btn-predict" onclick="predictPrice()">Calculate Price</button>
        </form>
        
        <div id="result-container" class="hidden">
            <h2>Predicted Price</h2>
            <div class="price-value" id="price_result">$0.00</div>
            <p class="insight" id="price_insight">Based on 10 trained features.</p>
        </div>
    </div>

    <script src="predict.js"></script>
</body>
</html>
